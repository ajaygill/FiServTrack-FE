<h2>{{type==='payment'?'Add Payment':'Receive Payment'}}</h2><div class="card"><div class="form-grid"><div><label>Account</label><select [(ngModel)]="form.accountId"><option *ngFor="let x of accounts" [value]="x.id">{{x.name}}</option></select></div><div><label>Payment Mode</label><select [(ngModel)]="form.paymentModeId"><option *ngFor="let x of paymentModes" [value]="x.id">{{x.name}}</option></select></div><div><label>Currency</label><select [(ngModel)]="form.currencyId"><option *ngFor="let x of currencies" [value]="x.id">{{x.code}}</option></select></div><div><label>Amount</label><input type="number" [(ngModel)]="form.amount"></div><div><label>Date</label><input type="date" [(ngModel)]="form.transactionDate"></div><div><label>Reference No</label><input [(ngModel)]="form.referenceNo"></div><div><label>Description</label><input [(ngModel)]="form.description"></div></div><br><button class="btn" (click)="save()">Save</button></div><div class="card"><h3>Recent Transactions</h3><table><tr><th>Date</th><th>Type</th><th>Account</th><th>Amount</th><th>Mode</th></tr><tr *ngFor="let t of transactions"><td>{{t.transactionDate|date}}</td><td>{{t.transactionType===1?'Payment':'Receipt'}}</td><td>{{t.account?.name}}</td><td>{{t.amount}}</td><td>{{t.paymentMode?.name}}</td></tr></table></div>
