<div class="page-shell">
  <div class="page-header">
    <h2>{{ isEdit ? 'Edit Account' : 'Add Account' }}</h2>
    <a routerLink="/masters/accounts" class="back-link">← Back to list</a>
  </div>

  <div class="card form-card">
    <div class="form-grid">
      <div class="form-field" [class.field-invalid]="fieldErrors['name']">
        <label>Name <span class="required">*</span></label>
        <input [(ngModel)]="form.name" (ngModelChange)="clearFieldError('name')">
        <p *ngIf="fieldErrors['name']" class="field-error">{{ fieldErrors['name'] }}</p>
      </div>
      <div class="form-field">
        <label>Group</label>
        <select [(ngModel)]="form.groupId">
          <option [ngValue]="null">Select Group</option>
          <option *ngFor="let x of accountGroups" [ngValue]="x.id">{{ x.name }}</option>
        </select>
      </div>
      <div class="form-field">
        <label>Frequency</label>
        <select [(ngModel)]="form.frequencyId">
          <option [ngValue]="null">Select Frequency</option>
          <option *ngFor="let x of frequencies" [ngValue]="x.id">{{ x.name }}</option>
        </select>
      </div>
      <div class="form-field">
        <label>Transaction Day</label>
        <input type="number" min="1" max="31" [(ngModel)]="form.paymentDay" placeholder="Day in period (e.g. 1 or 15)" title="Day money is received or paid (salary, bills, EMI, etc.)">
      </div>
      <div class="form-field" [class.field-invalid]="fieldErrors['accountTypeId']">
        <label>Account Type <span class="required">*</span></label>
        <select [(ngModel)]="form.accountTypeId" (ngModelChange)="clearFieldError('accountTypeId')">
          <option [ngValue]="null" disabled>Select Account Type</option>
          <option *ngFor="let x of accountTypes" [ngValue]="x.id">{{ x.description }}</option>
        </select>
        <p *ngIf="fieldErrors['accountTypeId']" class="field-error">{{ fieldErrors['accountTypeId'] }}</p>
      </div>
      <div class="form-field">
        <label>Currency</label>
        <select [(ngModel)]="form.currencyId">
          <option [ngValue]="null">Select Currency</option>
          <option *ngFor="let x of currencies" [ngValue]="x.id">{{ x.code }} {{ x.symbol }}</option>
        </select>
      </div>
      <div class="form-field">
        <label>Opening Balance</label>
        <input type="number" [(ngModel)]="form.openingBalance">
      </div>
      <div class="form-field">
        <label>Budget Amount</label>
        <input type="number" [(ngModel)]="form.budgetAmount">
      </div>
      <div class="form-field">
        <label>Fixed Amount</label>
        <input type="number" [(ngModel)]="form.fixedAmount">
      </div>
      <div class="toggle-cell">
        <label class="toggle-field">
          <span class="toggle-label">Is Loan</span>
          <span class="toggle-control">
            <input type="checkbox" class="toggle-input" [(ngModel)]="form.isLoan" (ngModelChange)="onLoanChange($event)">
            <span class="toggle-switch"></span>
          </span>
        </label>
      </div>
      <div class="form-field" [class.field-disabled]="!form.isLoan" [class.field-invalid]="fieldErrors['loanTypeId']">
        <label>Loan Type <span *ngIf="form.isLoan" class="required">*</span></label>
        <select [(ngModel)]="form.loanTypeId" [disabled]="!form.isLoan" (ngModelChange)="clearFieldError('loanTypeId')">
          <option [ngValue]="null" disabled>Select Loan Type</option>
          <option *ngFor="let x of loanTypes" [ngValue]="x.id">{{ x.name }}</option>
        </select>
        <p *ngIf="fieldErrors['loanTypeId']" class="field-error">{{ fieldErrors['loanTypeId'] }}</p>
      </div>
      <div class="form-field" [class.field-disabled]="!form.isLoan" [class.field-invalid]="fieldErrors['loanRepaymentType']">
        <label>Loan Repayment Type <span *ngIf="form.isLoan" class="required">*</span></label>
        <select [(ngModel)]="form.loanRepaymentType" [disabled]="!form.isLoan" (ngModelChange)="onRepaymentTypeChange($event)">
          <option [ngValue]="null" disabled>Select Loan Repayment Type</option>
          <option *ngFor="let x of loanRepaymentTypes" [ngValue]="x.value">{{ x.label }}</option>
        </select>
        <p *ngIf="fieldErrors['loanRepaymentType']" class="field-error">{{ fieldErrors['loanRepaymentType'] }}</p>
      </div>
      <div class="form-field" [class.field-disabled]="!form.isLoan">
        <label>{{ isInterestOnlyLoan() ? 'Interest Amount' : 'Installment Amount' }}</label>
        <input type="number" [(ngModel)]="form.installmentAmount" [disabled]="!form.isLoan">
      </div>
      <div class="form-field" [class.field-disabled]="!form.isLoan || !isInstallmentLoan()">
        <label>No. Of Installments</label>
        <input type="number" [(ngModel)]="form.noOfInstallments" [disabled]="!form.isLoan || !isInstallmentLoan()">
      </div>
      <div class="toggle-cell">
        <label class="toggle-field">
          <span class="toggle-label">Active</span>
          <span class="toggle-control">
            <input type="checkbox" class="toggle-input" [(ngModel)]="form.isActive">
            <span class="toggle-switch"></span>
          </span>
        </label>
      </div>
      <div class="toggle-cell">
        <label class="toggle-field">
          <span class="toggle-label">Plan Budget</span>
          <span class="toggle-control">
            <input type="checkbox" class="toggle-input" [(ngModel)]="form.planBudget">
            <span class="toggle-switch"></span>
          </span>
        </label>
      </div>
      <div class="toggle-cell">
        <label class="toggle-field">
          <span class="toggle-label">Set Alerts</span>
          <span class="toggle-control">
            <input type="checkbox" class="toggle-input" [(ngModel)]="form.setAlerts">
            <span class="toggle-switch"></span>
          </span>
        </label>
      </div>
    </div>

    <p *ngIf="saveError" class="error save-error">{{ saveError }}</p>

    <div class="form-actions">
      <button type="button" class="btn" (click)="save()">Save</button>
      <button type="button" class="btn secondary" (click)="cancel()">Cancel</button>
    </div>
  </div>
</div>
