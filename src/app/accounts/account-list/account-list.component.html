<h2>Accounts</h2><div class="card"><h3>{{form.id?'Edit':'Add'}} Account</h3><div class="form-grid"><div><label>Name</label><input [(ngModel)]="form.name"></div><div><label>Group</label><select [(ngModel)]="form.groupId"><option [ngValue]="null">-- Select --</option><option *ngFor="let x of accountGroups" [value]="x.id">{{x.name}}</option></select></div><div><label>Frequency</label><select [(ngModel)]="form.frequencyId"><option [ngValue]="null">-- Select --</option><option *ngFor="let x of frequencies" [value]="x.id">{{x.name}}</option></select></div><div><label>Payment Day</label><input type="number" [(ngModel)]="form.paymentDay"></div><div><label>Account Type</label><select [(ngModel)]="form.accountTypeId"><option *ngFor="let x of accountTypes" [value]="x.id">{{x.name}}</option></select></div><div><label>Currency</label><select [(ngModel)]="form.currencyId"><option *ngFor="let x of currencies" [value]="x.id">{{x.code}} {{x.symbol}}</option></select></div><div><label>Opening Balance</label><input type="number" [(ngModel)]="form.openingBalance"></div><div><label>Budget Amount</label><input type="number" [(ngModel)]="form.budgetAmount"></div><div><label>Fixed Amount</label><input type="number" [(ngModel)]="form.fixedAmount"></div><div><label><input type="checkbox" [(ngModel)]="form.isLoan"> Is Loan</label></div><div><label>Loan Type</label><select [(ngModel)]="form.loanTypeId"><option [ngValue]="null">-- Select --</option><option *ngFor="let x of loanTypes" [value]="x.id">{{x.name}}</option></select></div><div><label>Installment Amount</label><input type="number" [(ngModel)]="form.installmentAmount"></div><div><label>No. Of Installments</label><input type="number" [(ngModel)]="form.noOfInstallments"></div><div><label><input type="checkbox" [(ngModel)]="form.planBudget"> Plan Budget</label></div><div><label><input type="checkbox" [(ngModel)]="form.setAlerts"> Set Alerts</label></div></div><br><button class="btn" (click)="save()">Save</button> <button class="btn secondary" (click)="form=empty()">Clear</button></div><div class="card"><table><thead><tr><th>Name</th><th>Type</th><th>Currency</th><th>Opening</th><th>Active</th><th></th></tr></thead><tbody><tr *ngFor="let a of accounts"><td>{{a.name}}</td><td>{{a.accountType?.name}}</td><td>{{a.currency?.code}}</td><td>{{a.openingBalance}}</td><td>{{a.isActive}}</td><td><button (click)="edit(a)">Edit</button> <button (click)="delete(a.id)">Delete</button></td></tr></tbody></table></div>
