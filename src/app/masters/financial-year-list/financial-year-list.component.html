<h2>Financial Years</h2>
<div class="card">
  <h3>{{form.id ? 'Edit' : 'Add'}} Financial Year</h3>
  <div class="form-grid">
    <div><label>Name</label><input [(ngModel)]="form.name"></div>
    <div><label>Start Date</label><input type="date" [(ngModel)]="form.startDate"></div>
    <div><label>End Date</label><input type="date" [(ngModel)]="form.endDate"></div>
    <div><label><input type="checkbox" [(ngModel)]="form.isActive"> Active</label></div>
  </div>
  <br>
  <button class="btn" (click)="save()">Save</button>
  <button class="btn secondary" (click)="form=empty()">Clear</button>
</div>
<div class="card">
  <table>
    <thead><tr><th>Name</th><th>Start</th><th>End</th><th>Active</th><th></th></tr></thead>
    <tbody>
      <tr *ngFor="let x of items">
        <td>{{x.name}}</td>
        <td>{{x.startDate}}</td>
        <td>{{x.endDate}}</td>
        <td>{{x.isActive}}</td>
        <td><button (click)="edit(x)">Edit</button> <button (click)="delete(x.id)">Delete</button></td>
      </tr>
    </tbody>
  </table>
</div>
