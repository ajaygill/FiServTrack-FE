<div class="page-shell">
  <div class="page-header">
    <h2>{{ config.title }}</h2>
    <div class="toolbar">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Search..." [(ngModel)]="search" (ngModelChange)="onSearchChange()">
      </div>
      <select class="toolbar-select" [(ngModel)]="sortBy" (ngModelChange)="onFilterChange()">
        <option *ngFor="let opt of config.sortOptions" [value]="opt.value">{{ opt.label }}</option>
      </select>
      <select *ngIf="hasStatus" class="toolbar-select" [(ngModel)]="statusFilter" (ngModelChange)="onFilterChange()">
        <option value="all">All Status</option>
        <option value="active">Active Only</option>
        <option value="inactive">Inactive Only</option>
      </select>
      <button type="button" class="btn add-btn" (click)="addNew()">+ Add</button>
    </div>
  </div>

  <div class="table-card">
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th *ngFor="let col of config.columns">{{ col.label }}</th>
            <th class="actions-col">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of pagedItems">
            <td *ngFor="let col of config.columns">
              <span *ngIf="col.type === 'status'" class="status-badge" [class.active]="row.isActive" [class.inactive]="!row.isActive">
                {{ row.isActive ? 'Active' : 'Inactive' }}
              </span>
              <span *ngIf="col.type === 'date'">{{ cellValue(row, col) }}</span>
              <span *ngIf="!col.type || col.type === 'text'">{{ cellValue(row, col) }}</span>
            </td>
            <td class="actions-col">
              <button type="button" class="icon-btn" title="Edit" (click)="edit(row)">✎</button>
              <button type="button" class="icon-btn danger" title="Delete" (click)="delete(row.id)">🗑</button>
            </td>
          </tr>
        </tbody>
      </table>
      <p *ngIf="filteredItems.length === 0" class="empty">No {{ config.title.toLowerCase() }} found.</p>
    </div>

    <div class="table-footer">
      <span>Showing {{ rangeStart }} to {{ rangeEnd }} of {{ filteredItems.length }} entries</span>
      <div class="pagination">
        <button type="button" class="page-btn" (click)="goToPage(1)" [disabled]="currentPage === 1">«</button>
        <button type="button" class="page-btn" (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1">‹</button>
        <button type="button" class="page-btn current">{{ currentPage }}</button>
        <button type="button" class="page-btn" (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages">›</button>
        <button type="button" class="page-btn" (click)="goToPage(totalPages)" [disabled]="currentPage === totalPages">»</button>
      </div>
    </div>
  </div>
</div>
