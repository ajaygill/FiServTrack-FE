<h2>Currencies</h2>
<div class="card">
  <h3>{{form.id ? 'Edit' : 'Add'}} Currency</h3>
  <div class="form-grid">
    <div><label>Code</label><input [(ngModel)]="form.code"></div>
    <div><label>Name</label><input [(ngModel)]="form.name"></div>
    <div><label>Symbol</label><input [(ngModel)]="form.symbol"></div>
    <div><label><input type="checkbox" [(ngModel)]="form.isActive"> Active</label></div>
  </div>
  <br>
  <button class="btn" (click)="save()">Save</button>
  <button class="btn secondary" (click)="form=empty()">Clear</button>
</div>
<div class="card">
  <table>
    <thead><tr><th>Code</th><th>Name</th><th>Symbol</th><th>Active</th><th></th></tr></thead>
    <tbody>
      <tr *ngFor="let x of items">
        <td>{{x.code}}</td>
        <td>{{x.name}}</td>
        <td>{{x.symbol}}</td>
        <td>{{x.isActive}}</td>
        <td><button (click)="edit(x)">Edit</button> <button (click)="delete(x.id)">Delete</button></td>
      </tr>
    </tbody>
  </table>
</div>
